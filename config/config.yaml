# ============================================================================
# MARS - Malware Analysis & Reverse-engineering System
# Main Configuration File
# ============================================================================

# ----------------------------------------------------------------------------
# 1. System & Global Pipeline Controls
# ----------------------------------------------------------------------------
system:
  # FR-INT-01: Maximum allowed file ingestion size (in Gigabytes)
  max_file_size_gb: 5
  
  # FR-INT-02: Whitelisted file extensions to allow through the Intake Module
  allowed_extensions:
    - '.zip'
    - '.exe'
    - '.dll'
    - '.msi'
    - '.sys'

  # FR-PKG-01: Maximum recursive unpacking depth to prevent Zip-Bomb DoS attacks
  max_unpack_depth: 3

  # Directory definitions for the workspace environment
  workspace_dir: "./workspace"
  extract_dir: "./workspace/extracted"
  reports_dir: "./workspace/reports"


# ----------------------------------------------------------------------------
# 2. Static Analysis Thresholds & Rulesets
# ----------------------------------------------------------------------------
static_analysis:
  # FR-STA-07: Relative path to the local YARA engine signatures
  yara_rules_path: "rules/rules.yar"
  
  # FR-STA-04: Shannon Entropy limit. Sections scoring >= to this are flagged 
  # as highly compressed, obfuscated, or encrypted. (Standard is 7.0 for packed)
  entropy_threshold: 7.0
  
  # FR-STA-05: Target API patterns monitored inside the Import Address Table (IAT)
  # Tracks specific execution redirection, process hollowing, and downloading.
  suspicious_imports:
    # Process Injection / Memory Manipulation
    - "CreateRemoteThread"
    - "VirtualAllocEx"
    - "WriteProcessMemory"
    - "SetThreadContext"
    - "QueueUserAPC"
    # Process Execution
    - "ShellExecuteA"
    - "ShellExecuteW"
    - "ShellExecuteExA"
    - "WinExec"
    - "CreateProcessA"
    - "CreateProcessW"
    # Network / Downloaders
    - "InternetOpenA"
    - "InternetOpenW"
    - "URLDownloadToFileA"
    - "URLDownloadToFileW"
    # Anti-Analysis / Dumping
    - "IsDebuggerPresent"
    - "CheckRemoteDebuggerPresent"
    - "MiniDumpWriteDump"


# ----------------------------------------------------------------------------
# 3. Graphical User Interface (GUI) Settings
# ----------------------------------------------------------------------------
gui:
  # Application window defaults
  window_title: "MARS - Malware Analysis & Reverse-engineering System"
  default_width: 1000
  default_height: 700
  
  # Polling interval for thread-safe UI updates (in milliseconds)
  refresh_rate_ms: 100

  # ----------------------------------------------------------------------------
# 4. Dynamic Analysis & Sandbox Configuration
# ----------------------------------------------------------------------------
sandbox:
  # Total time (in seconds) to allow the malware to detonate and run
  timeout_seconds: 60

  # Paths on the Host (VM A) to interact with the VMware engine and Sandbox
  vmrun_path: "C:\\Program Files (x86)\\VMware\\VMware Workstation\\vmrun.exe"
  vmx_path: "D:\\Virtual Machines\\Windows10_Sandbox\\Windows10_Sandbox.vmx"

  # Sandbox Restoration & Authentication State
  snapshot_name: "Clean_State"
  guest_user: "Admin"
  guest_pass: "Password123"

  # Out-of-Band Telemetry & Network Interception Configurations
  # serial_pipe matches the named pipe configured in VM B's hardware settings
  serial_pipe: "\\\\.\\pipe\\sandbox_serial"
  
  # The host-only virtual network adapter connected to the sandbox for Scapy sniffing
  network_interface: "vmnet1"